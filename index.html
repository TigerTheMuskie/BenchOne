<div id="bo-root">
  <div class="bo-panel">
    <header class="bo-header">
      <div class="bo-brand">
        <span class="bo-dot" id="bo-status-dot"></span>
        <div>
          <div class="bo-title">BENCH ONE</div>
          <div class="bo-subtitle">Phonoenterography Capture Console</div>
        </div>
      </div>
      <div class="bo-clock" id="bo-clock">00:00:00</div>
    </header>

    <section class="bo-row bo-controls">
      <div class="bo-field">
        <label for="bo-device">Input</label>
        <select id="bo-device"><option>Scanning devices…</option></select>
      </div>
      <button id="bo-arm" class="bo-btn bo-btn-outline">Connect Input</button>
    </section>

    <section class="bo-row bo-gain-row">
      <div class="bo-field">
        <label for="bo-gain">Gain <span id="bo-gain-value">3.0x</span></label>
        <input type="range" id="bo-gain" min="1" max="10" step="0.1" value="3" />
      </div>
    </section>

    <section class="bo-scope-wrap">
      <canvas id="bo-scope" class="bo-scope"></canvas>
      <div class="bo-scope-grid"></div>
      <div class="bo-scope-readout">
        <span id="bo-format-readout">— · — · —</span>
      </div>
    </section>

    <section class="bo-row bo-transport">
      <button id="bo-record" class="bo-btn bo-btn-record" disabled>
        <span class="bo-rec-dot"></span> Record
      </button>
      <div class="bo-timer" id="bo-timer">00:00</div>
      <select id="bo-duration">
        <option value="10">10s</option>
        <option value="15">15s</option>
        <option value="30">30s</option>
        <option value="0">Manual stop</option>
      </select>
    </section>

    <section class="bo-notes">
      <label for="bo-note">Session note</label>
      <input id="bo-note" type="text" placeholder="e.g. post-prandial, 45 min after bitter isolate dose" />
    </section>
  </div>

  <div class="bo-panel bo-log-panel">
    <div class="bo-log-header">
      <span>Session Log</span>
      <span id="bo-log-count" class="bo-log-count">0 recordings</span>
    </div>
    <div id="bo-log-empty" class="bo-log-empty">No recordings yet. Connect an input and record your first session.</div>
    <ul id="bo-log-list" class="bo-log-list"></ul>
  </div>
</div>

<style>
  #bo-root {
    --bo-bg: #0b0f0d;
    --bo-panel: #10231a;
    --bo-panel-2: #0d1b14;
    --bo-trace: #5df2a6;
    --bo-trace-dim: #1f5c3e;
    --bo-amber: #e8b04b;
    --bo-red: #e05a4e;
    --bo-text: #d7e6dc;
    --bo-text-dim: #7fa08c;
    --bo-border: #1d3a2b;
    --bo-mono: 'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
    --bo-sans: 'IBM Plex Sans', 'Inter', system-ui, sans-serif;

    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 18px;
    background: var(--bo-bg);
    color: var(--bo-text);
    font-family: var(--bo-sans);
    padding: 20px;
    border-radius: 10px;
    box-sizing: border-box;
  }
  #bo-root * { box-sizing: border-box; }
  @media (max-width: 780px) {
    #bo-root { grid-template-columns: 1fr; }
  }

  .bo-panel {
    background: var(--bo-panel);
    border: 1px solid var(--bo-border);
    border-radius: 8px;
    padding: 18px;
  }

  .bo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--bo-border);
    margin-bottom: 16px;
  }
  .bo-brand { display: flex; align-items: center; gap: 10px; }
  .bo-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--bo-text-dim);
    box-shadow: 0 0 0 3px rgba(127,160,140,0.12);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .bo-dot.live {
    background: var(--bo-trace);
    box-shadow: 0 0 0 3px rgba(93,242,166,0.18), 0 0 10px rgba(93,242,166,0.6);
  }
  .bo-dot.rec {
    background: var(--bo-red);
    box-shadow: 0 0 0 3px rgba(224,90,78,0.2), 0 0 10px rgba(224,90,78,0.7);
    animation: bo-pulse 1s ease-in-out infinite;
  }
  @keyframes bo-pulse { 50% { opacity: 0.35; } }

  .bo-title {
    font-family: var(--bo-mono);
    font-size: 15px;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--bo-text);
  }
  .bo-subtitle {
    font-size: 11px;
    color: var(--bo-text-dim);
    letter-spacing: 0.02em;
    margin-top: 2px;
  }
  .bo-clock {
    font-family: var(--bo-mono);
    font-size: 12px;
    color: var(--bo-text-dim);
    letter-spacing: 0.05em;
  }

  .bo-row { display: flex; align-items: flex-end; gap: 12px; }
  .bo-controls { margin-bottom: 16px; }
  .bo-gain-row { margin-bottom: 16px; }
  .bo-gain-row label { display: flex; justify-content: space-between; }
  .bo-gain-row #bo-gain-value { color: var(--bo-amber); font-family: var(--bo-mono); }
  input[type="range"] {
    width: 100%;
    accent-color: var(--bo-trace);
    background: transparent;
  }

  .bo-field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .bo-field label, .bo-notes label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--bo-text-dim);
  }
  select, input[type="text"] {
    background: var(--bo-panel-2);
    border: 1px solid var(--bo-border);
    color: var(--bo-text);
    padding: 9px 10px;
    border-radius: 5px;
    font-family: var(--bo-sans);
    font-size: 13px;
    outline: none;
  }
  select:focus, input:focus { border-color: var(--bo-trace-dim); }

  .bo-btn {
    font-family: var(--bo-sans);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 5px;
    border: 1px solid var(--bo-border);
    cursor: pointer;
    background: var(--bo-panel-2);
    color: var(--bo-text);
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .bo-btn:hover:not(:disabled) { border-color: var(--bo-trace-dim); }
  .bo-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .bo-btn-outline { }
  .bo-btn-record {
    display: flex; align-items: center; gap: 8px;
    background: var(--bo-panel-2);
  }
  .bo-btn-record.active {
    background: rgba(224,90,78,0.14);
    border-color: var(--bo-red);
    color: #ffd9d4;
  }
  .bo-rec-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bo-red); display: inline-block;
  }

  .bo-scope-wrap {
    position: relative;
    background: #060a08;
    border: 1px solid var(--bo-border);
    border-radius: 6px;
    height: 190px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .bo-scope { width: 100%; height: 100%; display: block; }
  .bo-scope-grid {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(to right, rgba(93,242,166,0.06) 0, rgba(93,242,166,0.06) 1px, transparent 1px, transparent 12.5%),
      repeating-linear-gradient(to bottom, rgba(93,242,166,0.06) 0, rgba(93,242,166,0.06) 1px, transparent 1px, transparent 20%);
    pointer-events: none;
  }
  .bo-scope-readout {
    position: absolute; bottom: 8px; right: 12px;
    font-family: var(--bo-mono);
    font-size: 10px;
    color: var(--bo-trace-dim);
    letter-spacing: 0.05em;
  }

  .bo-transport { align-items: center; margin-bottom: 16px; }
  .bo-timer {
    font-family: var(--bo-mono);
    font-size: 20px;
    color: var(--bo-amber);
    min-width: 62px;
    text-align: center;
  }
  #bo-duration { max-width: 120px; }

  .bo-notes { display: flex; flex-direction: column; gap: 6px; }

  .bo-log-panel { display: flex; flex-direction: column; }
  .bo-log-header {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--bo-text-dim);
    padding-bottom: 12px; border-bottom: 1px solid var(--bo-border); margin-bottom: 4px;
  }
  .bo-log-count { font-family: var(--bo-mono); color: var(--bo-text-dim); text-transform: none; letter-spacing: 0; }
  .bo-log-empty {
    color: var(--bo-text-dim);
    font-size: 12.5px;
    line-height: 1.5;
    padding: 20px 4px;
  }
  .bo-log-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
  .bo-log-item {
    padding: 11px 6px;
    border-bottom: 1px solid var(--bo-border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .bo-log-item-top { display: flex; justify-content: space-between; align-items: baseline; }
  .bo-log-time { font-family: var(--bo-mono); font-size: 12px; color: var(--bo-text); }
  .bo-log-dur { font-family: var(--bo-mono); font-size: 11px; color: var(--bo-text-dim); }
  .bo-log-note { font-size: 12px; color: var(--bo-text-dim); }
  .bo-log-actions { display: flex; gap: 8px; margin-top: 4px; }
  .bo-log-actions button {
    font-family: var(--bo-sans); font-size: 11px;
    background: none; border: 1px solid var(--bo-border); color: var(--bo-text-dim);
    padding: 4px 9px; border-radius: 4px; cursor: pointer;
  }
  .bo-log-actions button:hover { color: var(--bo-trace); border-color: var(--bo-trace-dim); }
</style>

<script>
(() => {
  const DB_NAME = 'bench-one-db';
  const STORE = 'recordings';
  let db, mediaStream, audioCtx, analyser, sourceNode, mediaRecorder, gainNode, destNode;
  let chunks = [];
  let recording = false;
  let recordStart = 0;
  let durationTimer = null;
  let animId = null;

  const els = {
    deviceSelect: document.getElementById('bo-device'),
    arm: document.getElementById('bo-arm'),
    record: document.getElementById('bo-record'),
    timer: document.getElementById('bo-timer'),
    duration: document.getElementById('bo-duration'),
    note: document.getElementById('bo-note'),
    canvas: document.getElementById('bo-scope'),
    statusDot: document.getElementById('bo-status-dot'),
    formatReadout: document.getElementById('bo-format-readout'),
    gain: document.getElementById('bo-gain'),
    gainValue: document.getElementById('bo-gain-value'),
    logList: document.getElementById('bo-log-list'),
    logEmpty: document.getElementById('bo-log-empty'),
    logCount: document.getElementById('bo-log-count'),
    clock: document.getElementById('bo-clock'),
  };

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const d = req.result;
        if (!d.objectStoreNames.contains(STORE)) {
          d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbAdd(record) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      const r = store.add(record);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const store = tx.objectStore(STORE);
      const r = store.getAll();
      r.onsuccess = () => resolve(r.result || []);
      r.onerror = () => reject(r.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      const r = store.delete(id);
      r.onsuccess = () => resolve();
      r.onerror = () => reject(r.error);
    });
  }

  async function populateDevices() {
    try {
      // Trigger a permission prompt first so labels are populated.
      const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
      tmp.getTracks().forEach(t => t.stop());
    } catch (e) {
      els.deviceSelect.innerHTML = '<option>Microphone access denied</option>';
      return;
    }
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d => d.kind === 'audioinput');
    els.deviceSelect.innerHTML = '';
    inputs.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      opt.textContent = d.label || 'Input device';
      els.deviceSelect.appendChild(opt);
    });
    if (inputs.length === 0) {
      els.deviceSelect.innerHTML = '<option>No input devices found</option>';
    }
  }

  async function connectInput() {
    stopStream();
    const deviceId = els.deviceSelect.value;
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          deviceId: deviceId ? { exact: deviceId } : undefined,
          channelCount: 2,
          sampleRate: 48000,
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        }
      });
    } catch (e) {
      alert('Could not open that input: ' + e.message);
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(mediaStream);
    gainNode = audioCtx.createGain();
    gainNode.gain.value = parseFloat(els.gain.value);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    destNode = audioCtx.createMediaStreamDestination();

    sourceNode.connect(gainNode);
    gainNode.connect(analyser);
    gainNode.connect(destNode);

    const track = mediaStream.getAudioTracks()[0];
    const settings = track.getSettings ? track.getSettings() : {};
    const rate = settings.sampleRate || audioCtx.sampleRate || '—';
    const chans = settings.channelCount || '—';
    els.formatReadout.textContent = `${chans}ch · ${rate}Hz · live`;

    els.statusDot.classList.add('live');
    els.record.disabled = false;
    drawScope();
  }

  function stopStream() {
    if (animId) cancelAnimationFrame(animId);
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    els.statusDot.classList.remove('live');
    els.record.disabled = true;
  }

  function drawScope() {
    const canvas = els.canvas;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const resize = () => {
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
    };
    resize();
    window.addEventListener('resize', resize);

    const bufferLength = analyser.fftSize;
    const dataArray = new Uint8Array(bufferLength);

    const traceColor = getComputedStyle(document.getElementById('bo-root')).getPropertyValue('--bo-trace').trim();

    function render() {
      animId = requestAnimationFrame(render);
      analyser.getByteTimeDomainData(dataArray);
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 2 * dpr;
      ctx.strokeStyle = recording ? '#e05a4e' : traceColor;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      const sliceWidth = w / bufferLength;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * h) / 2;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        x += sliceWidth;
      }
      ctx.stroke();
    }
    render();
  }

  function fmtClockMMSS(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function startRecordTimer(maxSec) {
    recordStart = Date.now();
    durationTimer = setInterval(() => {
      const elapsed = (Date.now() - recordStart) / 1000;
      els.timer.textContent = fmtClockMMSS(elapsed);
      if (maxSec > 0 && elapsed >= maxSec) {
        stopRecording();
      }
    }, 200);
  }

  function stopRecordTimer() {
    clearInterval(durationTimer);
  }

  async function startRecording() {
    if (!destNode) return;
    chunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : '';
    mediaRecorder = new MediaRecorder(destNode.stream, mimeType ? { mimeType } : undefined);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start();
    recording = true;
    els.statusDot.classList.add('rec');
    els.record.classList.add('active');
    els.record.innerHTML = '<span class="bo-rec-dot"></span> Stop';
    const maxSec = parseInt(els.duration.value, 10);
    startRecordTimer(maxSec);
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    recording = false;
    stopRecordTimer();
    els.statusDot.classList.remove('rec');
    els.record.classList.remove('active');
    els.record.innerHTML = '<span class="bo-rec-dot"></span> Record';
  }

  async function onRecordingStop() {
    const blob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
    const arrayBuffer = await blob.arrayBuffer();
    const record = {
      timestamp: Date.now(),
      durationSec: Math.round((Date.now() - recordStart) / 1000),
      note: els.note.value || '',
      mimeType: blob.type,
      data: arrayBuffer,
    };
    await dbAdd(record);
    els.note.value = '';
    els.timer.textContent = '00:00';
    await renderLog();
  }

  async function renderLog() {
    const all = (await dbGetAll()).sort((a, b) => b.timestamp - a.timestamp);
    els.logCount.textContent = `${all.length} recording${all.length === 1 ? '' : 's'}`;
    els.logEmpty.style.display = all.length ? 'none' : 'block';
    els.logList.innerHTML = '';
    all.forEach(rec => {
      const li = document.createElement('li');
      li.className = 'bo-log-item';
      const date = new Date(rec.timestamp);
      const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      li.innerHTML = `
        <div class="bo-log-item-top">
          <span class="bo-log-time">${dateStr} · ${timeStr}</span>
          <span class="bo-log-dur">${fmtClockMMSS(rec.durationSec)}</span>
        </div>
        ${rec.note ? `<div class="bo-log-note">${rec.note.replace(/</g, '&lt;')}</div>` : ''}
        <div class="bo-log-actions">
          <button data-action="play" data-id="${rec.id}">Play</button>
          <button data-action="download" data-id="${rec.id}">Download</button>
          <button data-action="delete" data-id="${rec.id}">Delete</button>
        </div>
      `;
      els.logList.appendChild(li);
    });
  }

  els.logList.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    const all = await dbGetAll();
    const rec = all.find(r => r.id === id);
    if (!rec) return;
    const action = btn.dataset.action;
    if (action === 'play') {
      const blob = new Blob([rec.data], { type: rec.mimeType });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
    } else if (action === 'download') {
      const blob = new Blob([rec.data], { type: rec.mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bench-one-${new Date(rec.timestamp).toISOString().replace(/[:.]/g, '-')}.webm`;
      a.click();
      URL.revokeObjectURL(url);
    } else if (action === 'delete') {
      await dbDelete(id);
      await renderLog();
    }
  });

  els.arm.addEventListener('click', connectInput);
  els.gain.addEventListener('input', () => {
    const v = parseFloat(els.gain.value);
    els.gainValue.textContent = `${v.toFixed(1)}x`;
    if (gainNode) gainNode.gain.value = v;
  });
  els.record.addEventListener('click', () => {
    if (!recording) startRecording(); else stopRecording();
  });

  function tickClock() {
    els.clock.textContent = new Date().toLocaleTimeString(undefined, { hour12: false });
  }
  setInterval(tickClock, 1000);
  tickClock();

  (async () => {
    db = await openDB();
    await populateDevices();
    await renderLog();
  })();
})();
</script>
